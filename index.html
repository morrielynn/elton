<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Elton 寶石挑戰 💎</title>
<!-- No external fonts - use system fonts for reliability -->
<style>
:root{
  --bg:#FFF8F0;--card:#fff;--pr:#FF6B35;--pl:#FFE8DF;
  --bl:#378ADD;--bll:#E6F1FB;--gn:#3B6D11;--gnl:#EAF3DE;
  --rd:#A32D2D;--rdl:#FCEBEB;--am:#854F0B;--aml:#FAEEDA;
  --tx:#1A1A1A;--t2:#666;--bo:#E8E8E8;--r:14px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;padding:.8rem .9rem 4rem;display:flex;flex-direction:column;gap:.6rem}

/* Hero */
#hero{background:var(--pr);border-radius:var(--r);padding:.8rem 1rem;box-shadow:0 3px 14px rgba(255,107,53,.25);display:flex;justify-content:space-between;align-items:center}
.ht{font-size:1.15rem;font-weight:900;color:#fff;text-align:center;width:100%}
.hd{font-size:.7rem;color:rgba(255,255,255,.82);font-weight:700;margin-top:1px}
.hw{font-size:.66rem;color:rgba(255,255,255,.75);font-weight:700;text-align:right}
.hs{font-size:1.9rem;font-weight:900;color:#fff;line-height:1;text-align:right}
.hu{font-size:.66rem;color:rgba(255,255,255,.75);text-align:right}

/* Progress */
#prog{background:var(--card);border-radius:var(--r);border:1.5px solid var(--bo);padding:.65rem .9rem;box-shadow:0 2px 6px rgba(0,0,0,.04)}
#pr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
#pr-txt{font-size:.74rem;font-weight:700;color:var(--t2)}
#pr-cnt{font-size:.74rem;font-weight:900;color:var(--pr)}
#pr-bar{height:9px;background:var(--bo);border-radius:50px;overflow:hidden}
#pr-fill{height:100%;background:linear-gradient(90deg,var(--pr),#ff9a6c);border-radius:50px;transition:width .5s;width:0%}

/* Bath */
#bath{display:none;background:var(--gn);border-radius:var(--r);padding:.8rem 1rem;text-align:center;animation:popIn .5s ease;box-shadow:0 3px 12px rgba(59,109,17,.2)}
@keyframes popIn{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
#bath .be{font-size:1.5rem}
#bath .bt{font-size:.95rem;font-weight:900;color:#fff;margin:.15rem 0 .05rem}
#bath .bs{font-size:.78rem;color:rgba(255,255,255,.9);font-weight:700}

/* Mode tabs */
#tabs{display:flex;gap:6px}
.tab{flex:1;padding:6px 2px;border-radius:12px;border:2px solid var(--bo);background:var(--card);font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:.72rem;font-weight:700;color:var(--t2);cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
.tab.on{border-color:var(--pr);background:var(--pl);color:var(--pr)}
.tab:active{transform:scale(.94)}

/* Session pills */
#pills{display:flex;gap:6px}
.pill{flex:1;background:var(--card);border:1.5px solid var(--bo);border-radius:50px;padding:6px 6px;font-size:.78rem;font-weight:700;color:var(--tx);text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.04)}
#pw{background:var(--rdl);border-color:#e8a0a0;color:var(--rd)}

/* Dots */
#dots{display:flex;justify-content:center;gap:7px;flex-wrap:wrap}
.dot{width:10px;height:10px;border-radius:50%;background:var(--bo);transition:all .3s;flex-shrink:0}
.dot.done{background:var(--gn)}.dot.on{background:var(--pr);transform:scale(1.4)}

/* Word card */
#wcard{background:var(--card);border-radius:var(--r);padding:1.2rem 1rem 1rem;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.07);border:1.5px solid var(--bo)}
#retry{display:inline-block;background:var(--aml);color:var(--am);border:1px solid #e0b87a;border-radius:50px;font-size:.66rem;font-weight:700;padding:2px 9px;margin-bottom:4px}
#emoji-btn{font-size:5rem;cursor:pointer;display:block;margin:0 auto .4rem;line-height:1.1;user-select:none;-webkit-user-select:none;border:none;background:none;padding:.2rem;transition:transform .15s}
#emoji-btn:active{transform:scale(.9)}
#wcard-sub{font-size:.74rem;color:var(--t2);margin-bottom:.1rem}

/* Hear again btn */
#hear-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin:.4rem auto 0;background:var(--bll);border:1.5px solid var(--bl);border-radius:50px;padding:7px 18px;font-size:.82rem;font-weight:700;color:#185FA5;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#hear-btn:active{transform:scale(.95)}

/* Blanks */
#blanks{display:flex;justify-content:center;gap:7px;flex-wrap:wrap;padding:0 .1rem}
.slot{width:46px;height:54px;border-radius:var(--rs);border:2.5px solid var(--bo);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.55rem;font-weight:900;color:var(--tx);cursor:pointer;transition:all .15s;user-select:none;-webkit-user-select:none}
.slot.on{border-color:var(--bl);color:var(--bl);background:var(--bll)}
.slot.ok{border-color:var(--gn);color:var(--gn);background:var(--gnl);animation:pop .35s}
.slot.bad{border-color:var(--rd);background:var(--rdl);animation:shk .35s}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

/* Feedback */
#fb{text-align:center;font-size:.95rem;font-weight:700;min-height:1.4rem}

/* Letter pool */
#pool{display:flex;justify-content:center;gap:6px;flex-wrap:nowrap;padding:0 .1rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.lb{width:48px;height:48px;border-radius:11px;border:2px solid var(--bo);background:var(--card);font-size:1.5rem;font-weight:900;color:var(--tx);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif;box-shadow:0 2px 6px rgba(0,0,0,.07);user-select:none;-webkit-user-select:none;transition:transform .1s,background .1s;flex-shrink:0}
.lb:active:not([disabled]){transform:scale(.85);background:var(--bll)}
.lb[disabled]{opacity:.2;pointer-events:none}
.lb.bk{animation:lbk .2s}
@keyframes lbk{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}

/* Spell controls */
#sctrl{display:flex;justify-content:center;gap:8px}
.cb{border-radius:50px;border:1.5px solid var(--bo);background:var(--card);padding:9px 15px;font-size:.8rem;font-weight:700;cursor:pointer;color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,sans-serif;box-shadow:0 2px 5px rgba(0,0,0,.05);transition:transform .1s}
.cb:active{transform:scale(.94)}

/* Syllable bar */
#syl-bar{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;margin:.4rem 0 .2rem}
.syl{background:#EEEDFE;border:1.5px solid #AFA9EC;border-radius:8px;padding:4px 10px;font-size:1rem;font-weight:900;color:#534AB7;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif;transition:all .15s;user-select:none}
.syl:active{background:#534AB7;color:#fff;transform:scale(.9)}
.syl-sep{font-size:1rem;font-weight:900;color:var(--bo);align-self:center}

/* Diamond collection */
#dm-counter{font-size:.72rem;font-weight:700;color:var(--t2);text-align:center;margin-bottom:.1rem}
/* Gems panel */
#gems{background:var(--card);border-radius:var(--r);border:1.5px solid var(--bo);padding:.9rem}
#gems h3{font-size:.9rem;font-weight:900;color:var(--tx);margin-bottom:.5rem;text-align:center}
#gems-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:.8rem}
.gem-card{background:var(--bg);border-radius:var(--r);border:1.5px solid var(--bo);padding:.7rem .4rem;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
.gem-card:active{transform:scale(.93)}
.gem-card .gem-icon{font-size:2.2rem;display:block;margin-bottom:.2rem}
.gem-card .gem-name{font-size:.62rem;font-weight:700;color:var(--tx)}
.gem-card .gem-num{font-size:.58rem;color:var(--t2)}
/* Gem detail modal */
#gem-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;justify-content:center;align-items:center}
#gem-modal.show{display:flex}
#gem-modal-inner{background:var(--card);border-radius:var(--r);padding:1.5rem 1.2rem;max-width:320px;width:90%;text-align:center;animation:popIn .3s ease}
#gem-modal .mi{font-size:5rem;margin-bottom:.5rem;display:block}
#gem-modal .mn{font-size:1.2rem;font-weight:900;color:var(--tx);margin-bottom:.3rem}
#gem-modal .md{font-size:.78rem;color:var(--t2);margin-bottom:.2rem}
#gem-modal .mc{font-size:.72rem;color:var(--t2);margin-bottom:1rem}
#gem-modal-close{background:var(--pr);color:#fff;border:none;border-radius:50px;padding:9px 28px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
/* Redeem button */
#redeem-btn{display:none;background:linear-gradient(135deg,#FFD700,#FF8C00);color:#fff;border:none;border-radius:50px;padding:11px 28px;font-size:.95rem;font-weight:900;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif;width:100%;margin-bottom:.5rem;box-shadow:0 3px 12px rgba(255,165,0,.4)}
#redeem-btn:active{transform:scale(.97)}
#gram-ex{display:none;background:var(--aml);border:1.5px solid #e0b87a;border-radius:var(--rs);padding:.6rem .8rem;font-size:.82rem;font-weight:700;color:var(--am);margin-top:.2rem;line-height:1.5}
/* Grammar question */
#gq{font-size:1.1rem;font-weight:900;color:var(--tx);text-align:center;line-height:1.5;background:var(--card);border-radius:var(--r);padding:1rem;border:1.5px solid var(--bo);box-shadow:0 4px 14px rgba(0,0,0,.07)}
.lv-a1{background:#E3F2FD;color:#1565C0;border:1px solid #90CAF9}
.lv-a1p{background:#F3E5F5;color:#6A1B9A;border:1px solid #CE93D8}
/* Syllable display with vowels */
#syl-bar{display:flex;justify-content:center;align-items:center;gap:3px;flex-wrap:wrap;margin:.4rem 0 .2rem}
.syl{background:none;border:none;font-size:1.2rem;font-weight:900;color:var(--tx);cursor:pointer;padding:2px 1px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.vowel{color:#E53935;font-weight:900}
.syl .vowel{color:#E53935;font-style:italic}
.syl-sep{font-size:1rem;color:var(--t2);font-weight:900;padding:0 1px}
/* Answer reveal Chinese small */
#reveal-zh{font-size:.75rem;color:var(--t2);margin-top:.15rem}
#gq .blank{display:inline-block;border-bottom:3px solid var(--pr);min-width:55px;color:var(--pr);font-weight:900;padding:0 4px}
#gchoices{display:flex;flex-direction:column;gap:8px}
.gc{background:var(--card);border:2px solid var(--bo);border-radius:var(--rs);padding:14px 16px;font-size:1.05rem;font-weight:700;color:var(--tx);cursor:pointer;text-align:left;font-family:-apple-system,BlinkMacSystemFont,sans-serif;width:100%;transition:transform .1s;min-height:50px;display:block;-webkit-tap-highlight-color:transparent}
.gc:active{transform:scale(.98)}
.gc.ok{border-color:var(--gn);background:var(--gnl);color:var(--gn)}
.gc.bad{border-color:var(--rd);background:var(--rdl);color:var(--rd)}
.gc.show{border-color:var(--gn);background:var(--gnl);color:var(--gn)}
#fb2{text-align:center;font-size:.95rem;font-weight:700;min-height:1.4rem}
#g-hear{display:flex;align-items:center;justify-content:center;gap:6px;margin:0 auto;background:var(--bll);border:1.5px solid var(--bl);border-radius:50px;padding:7px 18px;font-size:.82rem;font-weight:700;color:#185FA5;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#g-hear:active{transform:scale(.95)}

/* Library */
#lib{display:none;background:var(--card);border-radius:var(--r);border:1.5px solid var(--bo);padding:.8rem .9rem}
#lib h3{font-size:.85rem;font-weight:900;color:var(--tx);margin-bottom:.6rem}
.li{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bo);gap:8px}
.li:last-child{border-bottom:none}
.li-txt{font-size:.84rem;font-weight:700;color:var(--tx);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-sub{font-size:.72rem;color:var(--t2)}
.li-del{background:var(--rdl);border:1px solid #e8a0a0;color:var(--rd);border-radius:50px;padding:4px 12px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif;white-space:nowrap;flex-shrink:0}
.li-del:active{transform:scale(.92)}
.lib-sec{font-size:.72rem;font-weight:700;color:var(--t2);margin:.5rem 0 .3rem;border-bottom:1px solid var(--bo);padding-bottom:2px}
.lib-empty{color:var(--t2);font-size:.8rem;text-align:center;padding:.4rem 0}

/* Update */
#upd{display:none;background:var(--card);border-radius:var(--r);border:1.5px dashed var(--bo);padding:.9rem}
#upd p{font-size:.72rem;color:var(--t2);margin-bottom:.5rem;line-height:1.7;text-align:center}
.ul{font-size:.72rem;font-weight:700;color:var(--t2);margin:.5rem 0 3px}
textarea{width:100%;border:1.5px solid var(--bo);border-radius:var(--rs);padding:7px 10px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:.8rem;color:var(--tx);background:var(--bg);resize:none;height:80px;display:block}
textarea:focus{outline:none;border-color:var(--bl)}
textarea.tall{height:110px}
.fmt{background:var(--bll);border-radius:var(--rs);padding:.4rem .7rem;font-size:.7rem;color:#185FA5;margin:.2rem 0 .4rem;line-height:1.7}
#load-btn{background:var(--pr);color:#fff;border:none;border-radius:50px;padding:9px 22px;font-size:.86rem;font-weight:700;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif;display:block;margin:.6rem auto 0}
#load-btn:active{transform:scale(.95)}

/* Finish */
#fin{display:none;text-align:center;padding:1.2rem .5rem;flex-direction:column;align-items:center;gap:.5rem}
#fin.on{display:flex}
#fin-st{font-size:2.6rem}
#fin-msg{font-size:1.35rem;font-weight:900;color:var(--tx)}
#fin-sub{font-size:.9rem;color:var(--t2)}
#fin-bath{display:none;background:var(--gn);border-radius:var(--r);padding:1.1rem 1rem;width:100%;animation:popIn .5s ease;text-align:center}
#fin-bath .fe{font-size:2rem}
#fin-bath .ft{font-size:1rem;font-weight:900;color:#fff;margin:.15rem 0}
#fin-bath .ff{font-size:1.5rem;font-weight:900;color:#fff}
#fin-bath .fs{font-size:.76rem;color:rgba(255,255,255,.85);margin-top:.2rem}
.big-btn{border-radius:50px;border:1.5px solid var(--bo);background:var(--bll);border-color:var(--bl);color:#185FA5;padding:12px 26px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.big-btn:active{transform:scale(.95)}
.sm-btn{border-radius:50px;border:1.5px solid var(--bo);background:var(--card);padding:8px 16px;font-size:.8rem;font-weight:700;cursor:pointer;color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.sm-btn:active{transform:scale(.95)}
</style>
</head>
<body>
<div id="app">

<!-- Hero -->
<div id="hero" style="justify-content:center">
  <div>
    <div class="ht">Elton 寶石挑戰 💎</div>
    <div class="hd" id="hdate"></div>
  </div>


</div>

<!-- Progress -->
<div id="prog">
  <div id="pr-row">
    <div id="pr-txt">每日目標：100 分</div>
    <div style="display:flex;align-items:center;gap:6px">
      <button id="reset-btn" style="background:var(--rdl);border:1px solid #e8a0a0;border-radius:50px;padding:5px 14px;font-size:.72rem;font-weight:700;color:var(--rd);cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:32px">歸零</button>
      <button id="audio-unlock-btn" style="background:var(--bll);border:1.5px solid var(--bl);border-radius:50px;padding:5px 12px;font-size:.72rem;font-weight:700;color:#185FA5;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:32px">🔊</button>
    </div>
  </div>
  <div id="pr-bar"><div id="pr-fill"></div></div>
  <div id="dm-counter" style="font-size:.7rem;color:var(--t2);margin-top:4px;text-align:center"></div>
</div>

<!-- Tabs -->
<div id="tabs">
  <button class="tab on" id="t-game"><div>🎮</div><div>練習</div><div style="font-size:.55rem;opacity:.7">Practice</div></button>
  <button class="tab" id="t-lib"><div>💎</div><div>字庫</div><div style="font-size:.55rem;opacity:.7">Vocabulary</div></button>
  <button class="tab" id="t-gram"><div>📝</div><div>文法庫</div><div style="font-size:.55rem;opacity:.7">Grammar</div></button>
  <button class="tab" id="t-gems"><div>🏆</div><div>寶石</div><div style="font-size:.55rem;opacity:.7">Diamonds</div></button>
  <button class="tab" id="t-rec"><div>🫙</div><div>玻璃寶盒</div><div style="font-size:.55rem;opacity:.7">Glass Box</div></button>
</div>

<!-- Review screen (shown on first load) -->
<div id="review-screen" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:800;overflow-y:auto;padding:1rem;pointer-events:none">
  <div style="background:var(--card);border-radius:var(--r);border:1.5px solid var(--bo);padding:1rem;max-width:480px;margin:0 auto">
    <div style="font-size:.95rem;font-weight:900;color:var(--tx);text-align:center;margin-bottom:.6rem">📖 今日單字複習</div>
    <div id="review-word-list" style="margin-bottom:.8rem"></div>
    <button id="review-start-btn" style="background:linear-gradient(135deg,var(--pr),#FF6B35);color:#fff;border:none;border-radius:50px;padding:14px 0;font-size:1rem;font-weight:900;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif;width:100%;box-shadow:0 4px 16px rgba(255,107,53,.4)">✅ 準備好了！開始挑戰 💪</button>
  </div>
</div>

<!-- Library -->
<div id="lib" style="display:none"></div>

<!-- Grammar panel -->
<div id="gram-panel" style="display:none"></div>

<!-- Gems panel -->
<div id="gems" style="display:none"></div>

<!-- Record panel -->
<div id="rec" style="display:none"></div>

<!-- Game -->
<div id="game-wrap">
  <div id="pills">
    <div class="pill">🏆 <span id="sc">0</span> 分</div>
    <div class="pill" id="pw-btn" style="cursor:pointer">❌ <span id="wc">0</span> 答錯</div>
    <div class="pill" id="hint-btn" style="cursor:pointer;background:var(--bll);border-color:var(--bl);color:#185FA5">🧚 使用複習小天使</div>
  </div>

  <div id="dots"></div>

  <!-- Word card (spell) -->
  <div id="wcard" style="display:none">
    <div id="retry" style="display:none">🔁 再練一次</div>
    <button id="emoji-btn" aria-label="點擊聽發音"></button>
    <div id="syl-bar"></div>
    <div id="wcard-sub">點圖示或按請開始，再拼出這個字！</div>
    <div id="reveal-zh"></div>
    <button id="hear-btn">🔊 請開始</button>
  </div>

  <!-- Blanks -->
  <div id="blanks" style="display:none"></div>
  <div id="fb" style="display:none"></div>
  <div id="pool" style="display:none"></div>
  <div id="sctrl" style="display:none">
    <button class="cb" id="clear-btn">🗑️ 清除</button>
  </div>

  <!-- Grammar card -->
  <div id="gcard" style="display:none">
    <div id="gram-lv" style="text-align:center"></div>
    <div id="retry2" style="display:none;text-align:center;margin-bottom:4px">
      <span style="display:inline-block;background:var(--aml);color:var(--am);border:1px solid #e0b87a;border-radius:50px;font-size:.66rem;font-weight:700;padding:2px 9px">🔁 再練一次</span>
    </div>
    <div id="gq"></div>
    <div id="gchoices"></div>
    <div id="fb2"></div>
    <div id="gram-ex"></div>
  </div>
</div>

<!-- Finish -->
<div id="fin">
  <div id="fin-st"></div>
  <div id="fin-msg"></div>
  <div id="fin-sub"></div>
  <div id="fin-bath">
    <div class="fe">🛁🎉</div>
    <div class="ft">Elton 真努力！</div>
    <div class="ff" id="fin-score-msg" style="font-size:1.8rem;text-shadow:0 0 12px rgba(255,255,255,.8)"></div>
    <div class="ff">今天可以晚10分鐘洗澡</div>
    <div class="fs">本輪得分 <span id="fin-bc"></span> 分</div>
  </div>
  <button class="big-btn" id="restart-btn">🔄 再練一輪</button>
</div>

</div><!-- #app -->

<!-- Gem detail modal -->
<div id="gem-modal">
  <div id="gem-modal-inner">

function phonicsMap(word){
  const w=word.toLowerCase(),map={};
  let i=0;
  while(i<w.length){
    let hit=false;
    for(const[pat,snd] of PRULES){
      if(w.slice(i,i+pat.length)===pat){
        for(let j=0;j<pat.length;j++) map[i+j]=snd;
        i+=pat.length;hit=true;break;
      }
    }
    if(!hit){map[i]=w[i];i++;}
  }
  return map;
}

// Simple rule-based syllable splitter for common English words
function splitSyllables(word){
  const w=word.toLowerCase();
  // Special cases
  const specials={
    'elephant':['el','e','phant'],
    'school':['school'],
    'happy':['hap','py'],
    'apple':['ap','ple'],
    'banana':['ba','na','na'],
    'orange':['or','ange'],

    'rabbit':['rab','bit'],
    'kitten':['kit','ten'],
    'garden':['gar','den'],
    'purple':['pur','ple'],
    'simple':['sim','ple'],
    'little':['lit','tle'],
    'bottle':['bot','tle'],
    'turtle':['tur','tle'],
    'circle':['cir','cle'],
    'people':['peo','ple'],
    'table':['ta','ble'],
    'open':['o','pen'],
    'over':['o','ver'],
    'under':['un','der'],
    'after':['af','ter'],
    'water':['wa','ter'],
    'paper':['pa','per'],
    'river':['riv','er'],
    'seven':['sev','en'],
    'tiger':['ti','ger'],
    'never':['nev','er'],
    'super':['su','per'],
    'color':['col','or'],
    'robot':['ro','bot'],
    'music':['mu','sic'],
    'magic':['mag','ic'],
    'lemon':['lem','on'],
    'melon':['mel','on'],
  };
  if(specials[w]) return specials[w];
  // Fallback: VC|CV pattern
  const vowels='aeiou';
  const syls=[];
  let cur='';
  for(let i=0;i<w.length;i++){
    cur+=w[i];
    if(i<w.length-2){
      const isV=vowels.includes(w[i]);
      const nextC=!vowels.includes(w[i+1]);
      const nextNextV=vowels.includes(w[i+2]);
      if(isV&&nextC&&nextNextV&&cur.length>=2){
        syls.push(cur);cur='';
      }
    }
  }
  if(cur) syls.push(cur);
  return syls.length>1?syls:[w];
}

        const buf=_ac.createBuffer(1,1,_ac.sampleRate);
        const src=_ac.createBufferSource();
        src.buffer=buf;src.connect(_ac.destination);src.start(0);

      }catch(e){}
    }
  }catch(e){ _ac=null; }
  return _ac;
}

    if(ctx.state==='suspended'){

  }catch(e){}
}

function say(txt,rate){
  try{
    if(!txt||!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(String(txt));
    u.lang='en-US';u.rate=rate||0.78;
    u.onerror=function(){};
    speechSynthesis.speak(u);
  }catch(e){}
}

function getRarity(){
  // 普通到史詩完全隨機（各25%），傳說不會隨機出現
  const pool=['common','uncommon','rare','epic'];
  return pool[Math.floor(Math.random()*pool.length)];
}

function getRandomDiamond(wordLabel){
  const rid=getRarity();
  const pool=DM_GEMS.filter(g=>g.rarity===rid);
  const g=pool[Math.floor(Math.random()*pool.length)];
  const d=new Date();
  const dateStr=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
  return {icon:g.icon,name:g.name,rarity:rid,date:dateStr,word:wordLabel||'?'};
}

function showBoxDetail(box,num){
  try{
    const typeLabel=box.type==='green'?'🟢 換了一個綠點點':'🛁 換了延後10分鐘洗澡';
    document.getElementById('box-modal-title').textContent='🫙 玻璃寶盒 #'+num;
    document.getElementById('box-modal-info').textContent=typeLabel+'　📅 '+(box.date||'');

    const grid=document.getElementById('box-gem-grid');
    grid.innerHTML='';

    const gems=box.gems||[];
    if(!gems.length){
      grid.innerHTML='<div style="color:var(--t2);font-size:.82rem;text-align:center;padding:.5rem">沒有寶石資料</div>';
      document.getElementById('box-modal').style.display='flex';
      return;
    }

    if(!box.order||box.order.length!==gems.length){
      box.order=gems.map(function(_,i){return i;});
    }
    let order=box.order.slice();

    function renderBoxGems(){
      grid.innerHTML='';
      let dragIdx=null;
      order.forEach(function(gi,pos){
        const gem=gems[gi];
        if(!gem) return;
        const rt=RARITY.find(function(r){return r.id===gem.rarity;})||RARITY[0];
        const cell=document.createElement('div');
        cell.dataset.pos=String(pos);
        cell.style.cssText='background:'+rt.bg+';border:2px solid '+rt.border+';border-radius:var(--rs);padding:.5rem .2rem;text-align:center;cursor:grab;user-select:none;-webkit-user-select:none;box-shadow:'+rt.glow;
        cell.innerHTML='<div style="font-size:1.6rem">'+gem.icon+'</div>'
          +'<div style="font-size:.58rem;font-weight:700;color:var(--tx);margin-top:.1rem">'+(gem.name||'').split(' ')[0]+'</div>'
          +'<div style="font-size:.52rem;color:'+rt.border+';font-weight:900">'+rt.star+'</div>';

        cell.addEventListener('touchstart',function(){
          dragIdx=pos;
          cell.style.opacity='0.5';cell.style.transform='scale(1.1)';
        },{passive:true});
        cell.addEventListener('touchmove',function(e){
          const t=e.touches[0];
          const el=document.elementFromPoint(t.clientX,t.clientY);
          const target=el&&el.closest('[data-pos]');
          if(target){
            const tp=parseInt(target.dataset.pos);
            if(!isNaN(tp)&&tp!==dragIdx){
              const tmp=order[dragIdx];order[dragIdx]=order[tp];order[tp]=tmp;
              dragIdx=tp;
              box.order=order.slice();sv();
              renderBoxGems();
            }
          }
        },{passive:false});
        cell.addEventListener('touchend',function(){
          cell.style.opacity='';cell.style.transform='';dragIdx=null;
        },{passive:true});

        grid.appendChild(cell);
      });
    }

    renderBoxGems();
    document.getElementById('box-modal').style.display='flex';
  }catch(e){
    showMsg('無法開啟寶盒：'+e.message);
  }
}

  if(gems.length<10) return;

  const d=new Date();
  S.glassBoxes.push({
    date:`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`,
    type:type||'bath',
    gems:gems.slice(0,10)
  });
  S.diamonds=gems.slice(10);
  const k=todayK();
  S.days[k]={c:0,w:0};
  bathDone=false;bathDone2=false;
  sv();renderHeader();updateProg();renderDiamonds();renderGemsPanel();
  showTab('game');

    fb.style.cssText='position:fixed;top:20%;left:50%;transform:translateX(-50%);border-radius:var(--r);padding:1rem 1.4rem;font-size:1rem;font-weight:900;z-index:998;text-align:center;max-width:88vw';

      fb.style.boxShadow='0 4px 20px rgba(46,125,50,.4)';
      fb.innerHTML='🟢 兌換成功！<br>你得到一個綠點點！';
    } else {
      fb.style.background='linear-gradient(135deg,#FFD700,#FF8C00)';
      fb.style.color='#fff';
      fb.style.boxShadow='0 4px 20px rgba(255,165,0,.4)';
      fb.innerHTML='🛁 兌換成功！<br>今天可以延後10分鐘洗澡！';
    }
    document.body.appendChild(fb);
    setTimeout(()=>fb.remove(),3000);

function weekTotal(){
  // 本週每日答對題數×10 = 分數加總
  const t=new Date();let n=0;
  for(let i=0;i<7;i++){
    const d=new Date(t);d.setDate(t.getDate()-t.getDay()+i);
    const k=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    n+=(S.days[k]||{c:0}).c*10;
  }
  return n;
}

function showTab(t){
  // Always restore tabs and prog when switching
  document.getElementById('tabs').style.display='flex';
  document.getElementById('prog').style.display='block';
  const rs=document.getElementById('review-screen');
  if(rs){rs.style.display='none';rs.style.pointerEvents='none';}

  ['game','lib','gram-panel','gems','rec'].forEach(function(x){
    const id=x==='game'?'game-wrap':x;
    const el=document.getElementById(id);
    if(el)el.style.display=x===t?'block':'none';
    const tbId='t-'+(x==='gram-panel'?'gram':x);
    const tb=document.getElementById(tbId);
    if(tb)tb.classList.toggle('on',x===t);
  });
  const fin=document.getElementById('fin');if(fin)fin.classList.remove('on');
  if(t==='lib')renderLib();
  if(t==='gram-panel')renderGramLib();
  if(t==='gems')renderGemsPanel();
  if(t==='rec')renderRecord();
}

function renderLib(){
  try{
  const p=document.getElementById('lib');
  if(!p) return;
  p.innerHTML='';
  const h=document.createElement('h3');h.textContent='💎 字庫';p.appendChild(h);

  // ── Word list grouped by category with 5-per-page ──
  const wSec=document.createElement('div');wSec.className='lib-sec';wSec.textContent='🔤 單字（'+words.length+' 個）';p.appendChild(wSec);

  // Add word form
  const addRow=document.createElement('div');
  addRow.style.cssText='display:flex;gap:6px;margin-bottom:.6rem;align-items:center';
  const wIn=document.createElement('input');
  wIn.type='text';wIn.placeholder='英文 中文（例：cat 貓）';
  wIn.style.cssText='flex:1;border:1.5px solid var(--bo);border-radius:var(--rs);padding:8px 10px;font-size:.85rem;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:var(--tx);background:var(--bg)';
  const wBtn=document.createElement('button');
  wBtn.textContent='新增';
  wBtn.style.cssText='background:var(--pr);color:#fff;border:none;border-radius:50px;padding:8px 16px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif;white-space:nowrap';
  wBtn.addEventListener('click',function(){
    const val=wIn.value.trim();
    if(!val){showMsg('請輸入單字！');return;}
    const parts=val.split(/\s+/);
    const word=parts[0].toLowerCase();
    if(!/^[a-zA-Z]+$/.test(word)){showMsg('請輸入英文單字！');return;}
    const zh=parts.slice(1).join(' ')||word;
    if(words.find(function(w){return w.word===word;})){showMsg(word+' 已存在！');return;}
    words.push({word:word,zh:zh,emoji:'📝',cat:'其他'});
    S.words=words;sv();wIn.value='';renderLib();
    showMsg('✅ 已新增 '+word+'！');
  });
  addRow.appendChild(wIn);addRow.appendChild(wBtn);p.appendChild(addRow);

  // Search box
  const searchWrap=document.createElement('div');
  searchWrap.style.cssText='position:relative;margin-bottom:.5rem';
  const searchInput=document.createElement('input');
  searchInput.type='text';searchInput.placeholder='🔍 搜尋單字或中文...';
  searchInput.style.cssText='width:100%;box-sizing:border-box;border:1.5px solid var(--bo);border-radius:50px;padding:8px 36px 8px 14px;font-size:.88rem;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:var(--tx);background:var(--bg)';
  const clearBtn=document.createElement('button');
  clearBtn.textContent='✕';
  clearBtn.style.cssText='position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t2);font-size:.9rem;cursor:pointer;display:none;padding:4px';
  searchWrap.appendChild(searchInput);searchWrap.appendChild(clearBtn);p.appendChild(searchWrap);

  const wordListWrap=document.createElement('div');p.appendChild(wordListWrap);

  function renderWords(query){
    wordListWrap.innerHTML='';
    const q=(query||'').toLowerCase().trim();
    const VOWELS='aeiouAEIOU';
    const cats={};
    words.forEach(function(w){
      if(q&&!w.word.toLowerCase().includes(q)&&!w.zh.includes(q)) return;
      const c=w.cat||'其他';
      if(!cats[c])cats[c]=[];
      cats[c].push(w);
    });
    const CAT_ICONS={'食':'🍎','住':'🏠','行':'🏃','育':'📚','樂':'🎵','動物':'🐘','身體':'🫁','形容詞':'💬','健康':'🤧','自然':'🌿','其他':'🎯'};
    const CAT_ORDER=['食','住','行','育','樂','動物','身體','形容詞','健康','自然','其他'];
    const orderedCats=CAT_ORDER.filter(function(c){return cats[c];});
    Object.keys(cats).forEach(function(c){if(!orderedCats.includes(c))orderedCats.push(c);});

    if(!orderedCats.length){
      const e=document.createElement('div');e.className='lib-empty';e.textContent='找不到「'+q+'」';wordListWrap.appendChild(e);return;
    }

    orderedCats.forEach(function(cat){
      const catWords=cats[cat].slice().sort(function(a,b){return a.word.localeCompare(b.word);});
      const icon=CAT_ICONS[cat]||'📌';
      const ch=document.createElement('div');
      ch.style.cssText='font-size:.78rem;font-weight:900;color:var(--pr);margin:.6rem 0 .3rem;padding:.3rem .5rem;background:var(--bg);border-radius:var(--rs);border:1px solid var(--bo);display:flex;justify-content:space-between;align-items:center';
      ch.innerHTML=icon+' '+cat+'<span style="color:var(--t2);font-size:.7rem;font-weight:400">（'+catWords.length+' 個）</span>';
      wordListWrap.appendChild(ch);
      catWords.forEach(function(w,i){
        if(i>0){const hr=document.createElement('div');hr.style.cssText='border-top:1px solid var(--bo);margin:.1rem 0';wordListWrap.appendChild(hr);}
        const row=document.createElement('div');row.className='li';
        const txt=document.createElement('div');txt.className='li-txt';
        let wHtml=w.emoji+' ';
        for(const c2 of w.word){wHtml+=VOWELS.includes(c2)?'<span class="vowel">'+c2+'</span>':c2;}
        txt.innerHTML=wHtml;
        const sub=document.createElement('div');sub.className='li-sub';
        sub.textContent=w.zh+(w.phrase?' ｜ '+w.phrase:'');
        row.appendChild(txt);row.appendChild(sub);wordListWrap.appendChild(row);
      });
    });
  }

  if(!words.length){
    const e=document.createElement('div');e.className='lib-empty';e.textContent='尚無單字';wordListWrap.appendChild(e);
  } else {
    renderWords('');
  }

  searchInput.addEventListener('input',function(){
    const q=this.value;
    clearBtn.style.display=q?'block':'none';
    renderWords(q);
  });
  clearBtn.addEventListener('click',function(){
    searchInput.value='';this.style.display='none';renderWords('');searchInput.focus();
  });

  }catch(e){console.log('renderLib err',e);}
}

// ═══════════════════════════
//  QUEUE BUILDER (6 spell + 4 gram mixed)
// ═══════════════════════════
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r;}

function buildQ(){
  if(!S.seen)S.seen=[];
  if(!S.seenCount)S.seenCount={};

  // 錯題優先且機率提高（放入3份）
  const wBad=words.filter(function(w){return S.ww.includes(w.word);});
  const wBadWeighted=[...wBad,...wBad,...wBad]; // 3倍機率

  const wGood=words.filter(function(w){return !S.ww.includes(w.word);});
  const wUnseen=wGood.filter(function(w){return !S.seen.includes(w.word);});

  if(wUnseen.length<6-Math.min(wBad.length,3)){
    S.seen=wBad.map(function(w){return w.word;});sv();
  }
  const wAvail=wGood.filter(function(w){return !S.seen.includes(w.word);});
  const wShuffled=shuffle(wAvail);

  // Fill slots: wrong words first (up to 3), then unseen
  const wPick=[];
  const badPick=shuffle(wBadWeighted).slice(0,Math.min(3,wBad.length));
  const seen_ids=new Set();
  badPick.forEach(function(w){
    if(!seen_ids.has(w.word)){seen_ids.add(w.word);wPick.push(w);}
  });
  wShuffled.forEach(function(w){
    if(wPick.length<6&&!seen_ids.has(w.word)){seen_ids.add(w.word);wPick.push(w);}
  });

  wPick.forEach(function(w){
    if(!S.seen.includes(w.word))S.seen.push(w.word);
    S.seenCount[w.word]=(S.seenCount[w.word]||0)+1;
  });
  sv();

  const spells=wPick.slice(0,6).map(function(w){return Object.assign({},w,{type:'spell'});});

  // ── 文法平均出題（同樣循環機制）──
  if(!S.seenGram)S.seenGram=[];
  const gramsWithIdx=grams.map(function(g,idx){return Object.assign({},g,{gi:idx,type:g.type||'gram'});});
  const gBad=gramsWithIdx.filter(function(x){return S.wg.includes(x.gi);});
  const gBadWeighted=[...gBad,...gBad,...gBad]; // 3倍機率
  const gGood=gramsWithIdx.filter(function(x){return !S.wg.includes(x.gi);});
  const gUnseen=gGood.filter(function(x){return !S.seenGram.includes(x.gi);});

  if(gUnseen.length<4-Math.min(gBad.length,2)){
    S.seenGram=gBad.map(function(x){return x.gi;});sv();
  }
  const gAvail=gGood.filter(function(x){return !S.seenGram.includes(x.gi);});

  // Fill: wrong first (up to 2), then unseen
  const gPick=[];
  const gSeen_ids=new Set();
  shuffle(gBadWeighted).slice(0,Math.min(2,gBad.length)).forEach(function(x){
    if(!gSeen_ids.has(x.gi)){gSeen_ids.add(x.gi);gPick.push(x);}
  });
  shuffle(gAvail).forEach(function(x){
    if(gPick.length<4&&!gSeen_ids.has(x.gi)){gSeen_ids.add(x.gi);gPick.push(x);}
  });
  gPick.forEach(function(x){if(!S.seenGram.includes(x.gi))S.seenGram.push(x.gi);});
  sv();

  const grms=gPick.slice(0,4);

  // ── 混合排列 S S G S S G S G S G ──
  const mixed=[];
  let si=0,gi=0;
  const pattern=['S','S','G','S','S','G','S','G','S','G'];
  for(const p of pattern){
    if(p==='S'&&si<spells.length) mixed.push(spells[si++]);
    else if(p==='G'&&gi<grms.length) mixed.push(grms[gi++]);
  }
  while(si<spells.length) mixed.push(spells[si++]);
  while(gi<grms.length) mixed.push(grms[gi++]);
  return mixed;
}

function startRound(){
  // Daily reset: if new day, clear session wrong seen so queue is fresh
  const today=todayK();
  if(S.lastRoundDay!==today){S.lastRoundDay=today;sv();}

  if(!words.length&&grams.length){
    // only grams
    Q=buildQ().filter(x=>x.type==='gram');
  } else {
    Q=buildQ();
    if(!Q.length){
      document.getElementById('fin').classList.remove('on');
      document.getElementById('game-wrap').style.display='block';
      document.getElementById('wcard').style.display='none';

// Color vowels red in any text (skips HTML tags)
function colorVowels(text){
  if(!text) return '';
  const VOWELS='aeiouAEIOU';
  let out='',inTag=false;
  for(const ch of String(text)){
    if(ch==='<'){inTag=true;out+=ch;}
    else if(ch==='>'){inTag=false;out+=ch;}
    else if(!inTag&&VOWELS.includes(ch)) out+='<span class="vowel">'+ch+'</span>';
    else out+=ch;
  }
  return out;
}

function renderSyllables(word){
  if(!word) return;
  const bar=document.getElementById('syl-bar');
  if(!bar) return;
  bar.innerHTML='';
  const syls=splitSyllables(word.toLowerCase());
  const VOWELS='aeiou';
  syls.forEach((syl,i)=>{
    if(i>0){
      const sep=document.createElement('span');
      sep.className='syl-sep';sep.textContent='·';bar.appendChild(sep);
    }
    const span=document.createElement('span');
    span.className='syl';
    // Color vowels red
    let html='';
    for(const ch of syl){
      if(VOWELS.includes(ch)) html+=`<span class="vowel">${ch}</span>`;
      else html+=ch;
    }
    span.innerHTML=html;
    span.addEventListener('click',function(){say(syl,.7);});
    bar.appendChild(span);
  });
}

function loadSpell(q){
  document.getElementById('gcard').style.display='none';
  document.getElementById('wcard').style.display='block';
  document.getElementById('blanks').style.display='flex';
  document.getElementById('fb').style.display='block';
  document.getElementById('pool').style.display='flex';
  document.getElementById('sctrl').style.display='flex';
  document.getElementById('hear-btn').style.display='flex';

  document.getElementById('retry').style.display=S.ww.includes(q.word)?'inline-block':'none';
  const eb=document.getElementById('emoji-btn');
  eb.textContent=q.emoji||'🔊';
  eb.onclick=function(){say(q.word,.72);};
  document.getElementById('syl-bar').innerHTML='';
  document.getElementById('reveal-zh').textContent='';
  document.getElementById('wcard-sub').innerHTML=colorVowels('點圖示或按請開始，再拼出這個字！');
  document.getElementById('fb').textContent='';

  input=Array(q.word.length).fill(null);
  waitCheck=false;
  renderBlanks(q);
  shuffled=shuffle(q.word.split(''));
  // Add 2 extra distractor letters
  const ALPHA='abcdefghijklmnoprstuw';
  let extras=[];
  while(extras.length<2){
    const ch=ALPHA[Math.floor(Math.random()*ALPHA.length)];
    if(!extras.includes(ch)) extras.push(ch);
  }
  shuffled=shuffle([...shuffled,...extras]);
  renderPool(q);

  document.getElementById('hear-btn').onclick=function(){say(q.word,.72);};
  setTimeout(()=>say(q.word,.72),500);
}

function renderBlanks(q){
  const a=document.getElementById('blanks');a.innerHTML='';
  input.forEach((ch,i)=>{
    const s=document.createElement('div');
    s.className='slot'+(ch?' on':'');
    s.textContent=ch||''; // preserve original case
    if(ch){(function(idx){s.addEventListener('click',function(){removeAt(idx,q);});})(i);}
    a.appendChild(s);
  });
}

function renderPool(q){
  const p=document.getElementById('pool');p.innerHTML='';lbtns=[];
  const VOWELS='aeiouAEIOU';
  shuffled.forEach((ch,si)=>{
    const b=document.createElement('button');b.className='lb';
    if(VOWELS.includes(ch)){
      b.innerHTML='<span class="vowel">'+ch+'</span>';
    } else {
      b.textContent=ch;
    }
    (function(letter,idx){
      b.addEventListener('click',function(){
        ensureAudio();
        if(b.disabled||waitCheck)return;
        b.classList.add('bk');setTimeout(()=>b.classList.remove('bk'),200);
        addLetter(letter,idx,b,q);
      });
    })(ch,si);
    p.appendChild(b);lbtns.push(b);
  });
}

function addLetter(ch,si,btn,q){
  if(waitCheck)return;
  const fi=input.indexOf(null);if(fi===-1)return;
  input[fi]=ch;btn.disabled=true;btn.setAttribute('disabled','');
  renderBlanks(q);
  if(!input.includes(null)){
    waitCheck=true;
    lbtns.forEach(b=>{b.disabled=true;b.setAttribute('disabled','');});
    // Check immediately (sync) to decide which sound to play
    const typed=input.filter(c=>c).join('');
    const correct=q.word.toLowerCase();
    // Play sound NOW in the click handler (iOS requires sync user gesture)
    if(typed===correct){
      playCheer();
    } else {
      playWrong();
    }
    // Then speak word and update UI after short delay
    setTimeout(()=>{
      if(typed)say(typed,.65);
      setTimeout(()=>checkSpell(q),800);
    },150);
  }
}

function removeAt(idx,q){
  if(waitCheck)return;
  const ch=input[idx];if(!ch)return;
  input[idx]=null;
  const b=lbtns.find(x=>x.disabled&&x.textContent.toLowerCase()===ch&&x.getAttribute('disabled'));
  if(b){b.disabled=false;b.removeAttribute('disabled');}
  renderBlanks(q);document.getElementById('fb').textContent='';
}

function checkSpell(q){
  const typed=input.join('').toLowerCase(),correct=q.word.toLowerCase();
  const slots=document.querySelectorAll('.slot');
  if(typed===correct){
    slots.forEach(s=>{s.classList.remove('on');s.classList.add('ok');});

    document.getElementById('wcard-sub').innerHTML=colorVowels(q.word.toUpperCase());

    const zhEl=document.getElementById('reveal-zh');
    if(zhEl) zhEl.innerHTML=q.zh+(q.phrase?'<div style="font-size:.72rem;color:var(--pr);margin-top:.2rem">📌 '+q.phrase+'</div>':'');
    document.getElementById('fb').innerHTML='<span style="color:var(--gn)">✅ 答對了！🎉</span>';
    addCorrect(q.word);S.ww=S.ww.filter(x=>x!==correct);sv();
    sCorrect+=10;document.getElementById('sc').textContent=sCorrect;
    setTimeout(()=>{cur++;loadQ();},2400);
  } else {
    slots.forEach(s=>{s.classList.remove('on');s.classList.add('bad');});
    // Clickable wrong feedback — tap to see detail
    try{
      const fbEl=document.getElementById('fb');
      if(fbEl){
        const fbSpan=document.createElement('span');
        fbSpan.style.cssText='color:var(--rd);cursor:pointer;text-decoration:underline dotted';
        fbSpan.innerHTML='❌ 答錯了！再試一次 👆';
        try{setTimeout(function(){say(q.word,0.45);},400);}catch(e){}
        fbSpan.addEventListener('click',function(){try{showWrongDetail(typed,correct,q);}catch(e){}});
        fbEl.innerHTML='';fbEl.appendChild(fbSpan);
      }
      addWrongSt();if(!S.ww.includes(correct))S.ww.push(correct);sv();
      sWrong++;
      const wcEl=document.getElementById('wc');if(wcEl)wcEl.textContent=sWrong;
      try{wrongLog.push({type:'spell',typed,correct});if(!S.wrongHistory)S.wrongHistory=[];S.wrongHistory.push({type:'spell',typed,correct,date:todayK()});sv();}catch(e){}
      const key='w'+correct+'_'+cur;
      if(!wrongSeen.has(key)){
        wrongSeen.add(key);
        Q.splice(cur+1,0,{...q});
        const qtEl=document.getElementById('qt');if(qtEl)qtEl.textContent=Q.length;
      }
    }catch(e){}
    // Reset in place after 1.2s
    setTimeout(()=>{
      try{
        // Clear bad slots
        document.querySelectorAll('.slot').forEach(s=>s.classList.remove('bad'));
        const eb=document.getElementById('emoji-btn');if(eb)eb.textContent=q.emoji||'🔊';
        const sb=document.getElementById('syl-bar');if(sb)sb.innerHTML='';
        const rz=document.getElementById('reveal-zh');if(rz)rz.textContent='';
        const ws=document.getElementById('wcard-sub');
        if(ws)ws.innerHTML=colorVowels('點圖示或按請開始，再拼出這個字！');
        const fb=document.getElementById('fb');if(fb)fb.textContent='';
        input=Array(q.word.length).fill(null);
        lbtns.forEach(b=>{b.disabled=false;b.removeAttribute('disabled');});
        waitCheck=false;
        renderBlanks(q);
        // Now move to next question (which is the re-inserted same question)
        cur++;loadQ();
      }catch(e){}
    },1200);
  }
}

document.getElementById('wrong-modal-close').addEventListener('click',function(){
  document.getElementById('wrong-modal').style.display='none';
});
document.getElementById('wrong-modal').addEventListener('click',function(e){
  if(e.target===this) this.style.display='none';
});
document.getElementById('read-cancel-btn').addEventListener('click',function(){
  document.getElementById('read-modal').style.display='none';
});
document.getElementById('read-modal').addEventListener('click',function(e){
  if(e.target===this) this.style.display='none';
});
document.getElementById('read-confirm-btn').addEventListener('click',function(){
  const book=document.getElementById('read-book-input').value.trim();
  if(!book){showMsg('請輸入書名！');return;}
  const legendPool=DM_GEMS.filter(function(g){return g.rarity==='legend';});
  const g=legendPool[Math.floor(Math.random()*legendPool.length)];
  const d=new Date();
  const dateStr=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
  // Save book record
  if(!S.books)S.books=[];
  S.books.push({title:book,date:dateStr,gem:g.icon});
  if(!S.diamonds)S.diamonds=[];
  S.diamonds.push({icon:g.icon,name:g.name,rarity:'legend',date:dateStr,word:'📚 '+book});
  sv();renderDiamonds();
  document.getElementById('read-modal').style.display='none';
  document.getElementById('read-book-input').value='';
  const fb=document.createElement('div');
  fb.style.cssText='position:fixed;top:20%;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#81C784,#388E3C);color:#fff;border-radius:var(--r);padding:.9rem 1.4rem;font-size:.95rem;font-weight:900;z-index:998;text-align:center;max-width:88vw;box-shadow:0 4px 20px rgba(56,142,60,.4)';
  fb.innerHTML='📚「'+book+'」閱讀完成！<br>'+g.icon+' '+g.name+'（稀有）已加入！';
  document.body.appendChild(fb);
  setTimeout(function(){fb.remove();},3000);
  const gemsPanel=document.getElementById('gems');
  if(gemsPanel&&gemsPanel.style.display!=='none') renderGemsPanel();
  // Also refresh record tab
  const recPanel=document.getElementById('rec');
  if(recPanel&&recPanel.style.display!=='none') renderRecord();
});
</script>
</body>
</html>
